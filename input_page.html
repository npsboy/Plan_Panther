<link rel="stylesheet" href="input_page_styles.css">
<body>

    <!-- Hamburger Menu Button -->
    <button id="sidebar-toggle" onclick="toggleSidebar()">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
    </button>

    <!-- Sidebar Overlay -->
    <div id="sidebar-overlay" onclick="closeSidebar()"></div>

    <div id="left_container">
        <div id="left_menu">

            <div class="brand-header">
                <h1>Plan Panther</h1>
                <p class="tagline">Plan, then pounce.</p>
            </div>

            <div class="button_holder1">
                <button class="button add" onclick="show_card()">Add +</button>
            </div>

            <div class="section-header">
                <span>Your Study Plan</span>
            </div>

            <div id="subjects_list">
                <br>
                <p class="empty-state-text"> Your subjects will be displayed here as you add them </p>
            </div>

            <div class="sidebar-bottom">
                <div class="button_holder1">
                    <button class="button submit">Make Study Plan</button>
                </div>

                <div class="button_holder1 start-afresh-row" onclick="clearAllData()">
                    <span>Start Afresh</span>
                    <img src="assets/icons/delete.png" alt="delete">
                </div>
            </div>

        </div>
        <div id="right_calendar">
            <h2>Study Plan</h2>

            <div id="calendar_navigation">
                <button id="prev_month">< Previous</button>
                <span id="current_month"></span>
                <button id="next_month">Next ></button>
                <div id="view_toggle">
                    <button id="btn_month_view" class="view-toggle-btn active" onclick="setCalendarView('month')" title="Month view"><img src="assets/icons/calendar_view_month.png" alt="Month"></button>
                    <button id="btn_week_view" class="view-toggle-btn" onclick="setCalendarView('week')" title="Week view"><img src="assets/icons/calendar_view_week.png" alt="Week"></button>
                </div>
            </div>
            <div id="day_labels">
                <div>Sun</div>
                <div>Mon</div>
                <div>Tue</div>
                <div>Wed</div>
                <div>Thu</div>
                <div>Fri</div>
                <div>Sat</div>
            </div>
            <div id="calendar"></div>

            <!-- Bottom action bar -->
            <div id="calendar_bottom_bar">
                <!-- Mobile submit button (hidden on desktop) -->
                <div id="mobile_submit_button" class="button_holder1">
                    <button class="button submit">Make Study Plan</button>
                </div>

                <button id="mark_busy_button_bar" onclick="toggle_mark_busy_mode()"><img src="assets/icons/busy.png" alt="busy"> Mark Busy</button>

                <button id="mark_holiday_button_bar" onclick="toggle_mark_holiday_mode()"><img src="assets/icons/holiday.png" alt="holiday"> Mark Holidays</button>

                <div class="export-dropdown">
                    <button class="button export" id="export-main-btn"><img src="assets/icons/calendar.png" alt="export"> Export</button>
                    <div class="export-options" id="export-options">
                        <button class="export-option" onclick="shareURL()">Share URL</button>
                        <button class="export-option" onclick="exportToGoogleCalendar()">Export to Google Calendar</button>
                        <button class="export-option" onclick="printAsPDF()">Print as PDF</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Day detail tooltip -->
    <div id="day-tooltip" role="tooltip"></div>

    <!-- Mobile drop-up overlay (closes bar when tapping outside) -->
    <div id="dropup-overlay" onclick="closeMobileBottomBar()"></div>

    <!-- Mobile drop-up FAB -->
    <button id="mobile-dropup-toggle" onclick="toggleMobileBottomBar()">
        <img src="assets/icons/drop-up.png" alt="menu">
    </button>

    <div id="background_darkener" onclick="cancel_card()">
        <div id="card">
            <div id="details">

                <select id="subject_name">
                    <option value="" disabled selected>Select Subject</option>
                    <option value="English">English</option>
                    <option value="Hindi">Hindi</option>
                    <option value="Social-Science">Social-Science</option>
                    <option value="Math">Math</option>
                    <option value="Geometry">Geometry</option>
                    <option value="Physics">Physics</option>
                    <option value="Chemistry">Chemistry</option>
                    <option value="Biology">Biology</option>
                    <option value="Other">Other</option>
                </select>
                <input type="text" id="subject_name_other" placeholder="Enter subject name" style="display: none;">
                <br><br><br>
                <div id="date_OE">
                    Date of Exam:
                    <input type="date" id="subject_date">
                </div>
                <br><br><br>
                <div id="difficulty">
                    Difficulty:
                    <input type="range" min="0" max="5" value="2" class="green_thumb" id="subject_difficulty">
                </div>
                <p id="difficulty_text" style="text-align: center; padding-left: 50px;">Easy</p>

            </div>

            <br><br>

            <button class="button add" style="align-self: center; width: 80%;" onclick="add_subject()"> Save  </button>

        </div>
    </div>

    <script src="timetable.js"></script>
</body>
